<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Pop Party</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #1a1025 0%, #2d1b4e 50%, #1a1025 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    #title {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #instructions {
      font-size: 1.2em;
      text-align: center;
      margin-bottom: 10px;
      max-width: 600px;
    }
    #scoreDisplay {
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 20px;
    }
    #gameArea {
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.1);
      border: 4px solid #ffb6c1;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(255, 182, 193, 0.5);
    }
    .bubble {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      transition: transform 0.1s ease-out;
    }
    .bubble:hover { transform: scale(1.1); }
    .bubble:active { transform: scale(0.9); }

    #goodBubble {
      background: radial-gradient(circle at 30% 30%, #fff 5%, #dda0dd 60%, #8a2be2 100%);
      box-shadow: 0 0 10px #dda0dd;
    }
    #goodBubble .eye {
      position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: 30%;
    }
    #goodBubble .eye.left { left: 25%; }
    #goodBubble .eye.right { right: 25%; }
    #goodBubble .mouth {
      position: absolute; width: 15px; height: 8px; border-bottom: 3px solid #000; border-radius: 0 0 8px 8px; bottom: 25%; left: 35%;
    }

    #badBubble {
      background: radial-gradient(circle at 30% 30%, #555 5%, #111 60%, #000 100%);
      box-shadow: 0 0 10px #ff0000;
    }
    #badBubble .eye {
      position: absolute; width: 8px; height: 8px; background: #ff0000; border-radius: 50%; top: 30%;
    }
    #badBubble .eye.left { left: 25%; transform: rotate(15deg); }
    #badBubble .eye.right { right: 25%; transform: rotate(-15deg); }
    #badBubble .mouth {
      position: absolute; width: 15px; height: 4px; background: #ff0000; border-radius: 2px; bottom: 30%; left: 35%;
    }
  </style>
</head>
<body>
  <h1 id="title">Bubble Pop Party!^-^</h1>
  <p id="instructions">Instructions: Click the cute purple bubble to score. AVOID the dark evil bubble or you lose!</p>
  <div id="scoreDisplay">Score: 0</div>
  <div id="gameArea">
    <div id="goodBubble" class="bubble">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
    </div>
    <div id="badBubble" class="bubble">
        <div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
    </div>
  </div>

  <script>
    let score = 0;
    const goodBubble = document.getElementById('goodBubble');
    const badBubble = document.getElementById('badBubble');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const gameArea = document.getElementById('gameArea');

    function moveElement(el) {
      const areaWidth = gameArea.offsetWidth - el.offsetWidth;
      const areaHeight = gameArea.offsetHeight - el.offsetHeight;
      const randomX = Math.floor(Math.random() * areaWidth);
      const randomY = Math.floor(Math.random() * areaHeight);
      el.style.left = `${randomX}px`;
      el.style.top = `${randomY}px`;
    }

    function resetGame() {
      score = 0;
      scoreDisplay.innerText = `Score: ${score}`;
      moveElement(goodBubble);
      moveElement(badBubble);
    }

    goodBubble.addEventListener('click', () => {
      score++;
      scoreDisplay.innerText = `Score: ${score}`;
      moveElement(goodBubble);
      moveElement(badBubble);
    });

    badBubble.addEventListener('click', () => {
      alert(`Game Over! You clicked the evil bubble. Final Score: ${score}`);
      resetGame();
    });

    resetGame();
  </script>
</body>
</html>
